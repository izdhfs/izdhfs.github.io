<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생일 맞추기</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      margin: 0;
      background-color: white;
    }

    h1 {
      width: 100%;
      max-width: 500px;
      text-align: left;
      font-size: 2.5em;
      margin-bottom: 40px;
      padding-left: 20px;
    }

    /* 생일 선택 컨테이너 */
    .birthday-container {
      display: flex;
      gap: 10px;
      width: 90%;
      max-width: 500px;
      margin-bottom: 50px;
    }

    /* 테두리 상자 (이미지 스타일 재현) */
    .input-group {
      position: relative;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 15px 10px;
      flex: 1;
    }

    .input-group label {
      position: absolute;
      top: -10px;
      left: 15px;
      background-color: white;
      padding: 0 5px;
      font-size: 0.85em;
      color: #70757a;
    }

    select, input {
      width: 100%;
      border: none;
      font-size: 1.2em;
      outline: none;
      background: transparent;
      text-align: center;
    }

    /* 월 선택 박스는 조금 더 넓게 */
    .group-month { flex: 1.5; }

    /* 버튼 공통 스타일 */
    .btn {
      background-color: #3b4b9b;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 30px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 100px; /* 이미지처럼 간격을 넓게 */
    }

    .btn-secondary {
      background-color: #3b4b9b;
      margin-bottom: 20px;
    }

    /* 결과 텍스트 스타일 */
    #result {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      margin-top: -50px; /* 버튼과 이전 버튼 사이 적절한 위치 */
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <h1>생일 맞추기</h1>

  <div class="birthday-container">
    <div class="input-group group-month">
      <label>Month</label>
      <select id="month">
        <option value="1">1월</option>
        <option value="2">2월</option>
        <option value="3" selected>3월</option>
        <option value="4">4월</option>
        <option value="5">5월</option>
        <option value="6">6월</option>
        <option value="7">7월</option>
        <option value="8">8월</option>
        <option value="9">9월</option>
        <option value="10">10월</option>
        <option value="11">11월</option>
        <option value="12">12월</option>
      </select>
    </div>

    <div class="input-group">
      <label>Day</label>
      <input type="number" id="day" value="13">
    </div>

    <div class="input-group">
      <label>Year</label>
      <input type="number" id="year" value="1945">
    </div>
  </div>

  <button class="btn" onclick="showBirthday()">생일 확인</button>

  <div id="result"></div>

  <button class="btn btn-secondary" onclick="history.back()">이전으로 돌아가기</button>

  <script>
    function showBirthday() {
      // 입력값 가져오기
      const year = document.getElementById('year').value;
      const month = document.getElementById('month').value;
      const day = document.getElementById('day').value;

      // 결과 메시지 생성
      const message = `당신의 생일은 ${year}년 ${month}월 ${day}일 입니다`;
      
      // 화면에 표시
      document.getElementById('result').innerText = message;
    }
  </script>

</body>
</html>
