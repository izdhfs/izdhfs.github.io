<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<style>
body {
    margin:0;
    background:#dcdcdc;
    text-align:center;
    font-family:Arial;
}

.top { position:relative; padding-top:40px;}
.big-number { position:absolute; top:10px; font-size:200px; font-weight:900;}
.left { left:40px;}
.right { right:40px;}

.title {
    font-size:42px;
    font-weight:bold;
}

.content {
    margin-top:150px;
}

.calculator {
    display:inline-block;
}

.display {
    font-size:40px;
    height:60px;
    margin-bottom:20px;
}

button {
    width:70px;
    height:70px;
    font-size:22px;
    margin:5px;
    background:#eee;
    border:1px solid #999;
    cursor:pointer;
}

button:hover {
    background:#ddd;
}

.result {
    font-size:70px;
    font-weight:bold;
    margin-top:20px;
}

.home-btn {
    margin-top:40px;
    padding:10px 20px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;
}

/* 결과 텍스트 기본 스타일 */
.result {
    font-size:80px;
    font-weight:bold;
    margin-top:30px;
    transition:0.2s;
}

/* 반짝 + 떨어짐 애니메이션 */
.boom {
    animation: dropBoom 0.6s ease-out;
}

</style>
</head>
<body>

<div class="top">
    <div class="big-number left">67</div>
    <div class="title">CALCULATOR</div>
    <div class="big-number right">67</div>
</div>

<div class="content">

<div class="calculator">
    <div class="display" id="display"></div>

    <!-- 첫 줄 -->
    <div>
        <button onclick="add('%')">%</button>
        <button onclick="clearAll()">C</button>
        <button onclick="backspace()">←</button>
        <button onclick="add('/')">÷</button>
    </div>

    <!-- 둘째 줄 -->
    <div>
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('+')">+</button>
    </div>

    <!-- 셋째 줄 -->
    <div>
        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')">-</button>
    </div>

    <!-- 넷째 줄 -->
    <div>
        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('*')">X</button>
    </div>

    <!-- 다섯째 줄 -->
    <div>
        <button onclick="add('0')">0</button>
        <button onclick="add('.')">•</button>
        <button onclick="clearAll()">C</button>
        <button onclick="calculate()">=</button>
    </div>
</div>

<div class="result" id="result"></div>

<br>
<button class="home-btn" onclick="location.href='index.html'">
    BACK TO HOME
</button>

</div>

<script>
let expression = "";

function add(value){
    expression += value;
    document.getElementById("display").innerText = expression;
}

function clearAll(){
    expression = "";
    document.getElementById("display").innerText = "";
    document.getElementById("result").innerText = "";
}

function backspace(){
    expression = expression.slice(0,-1);
    document.getElementById("display").innerText = expression;
}

function calculate(){
    // 실제 계산은 무시하고 항상 67 출력
    document.getElementById("result").innerText = "67";
}
</script>

</body>
</html>
