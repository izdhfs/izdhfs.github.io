<!DOCTYPE html>
<html>
<head>
    <title>AGE</title>
    <style>
        body {
            margin:0;
            padding:0;
            text-align:center;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
        }

        h1 {
            margin-top:40px;
            font-size:40px;
        }

        /* 좌우 67 */
        .side-number {
            position:absolute;
            top:150px;
            font-size:180px;
            font-weight:bold;
        }

        .left { left:80px; }
        .right { right:80px; }

        /* 입력 영역 */
        .input-area {
            margin-top:120px;
        }

        input {
            padding:10px;
            font-size:20px;
            width:200px;
            text-align:center;
        }

        button {
            padding:10px 20px;
            font-size:18px;
            margin-left:10px;
            cursor:pointer;
        }

        /* 결과 */
        .result {
            font-size:60px;
            font-weight:bold;
            margin-top:40px;
        }

        /* 홈 버튼 */
        .home-btn {
            margin-top:60px;
            padding:12px 28px;
            font-size:18px;
            background:black;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

    <h1>AGE CHECKER</h1>

    <div class="side-number left">67</div>
    <div class="side-number right">67</div>

    <div class="input-area">
        <input type="text" id="yearInput" placeholder="Enter year">
        <button onclick="checkAge()">CHECK</button>
    </div>

    <div id="result" class="result"></div>

    <button class="home-btn" onclick="location.href='index.html'">
        BACK TO HOME
    </button>

<script>
function checkAge() {
    const value = document.getElementById("yearInput").value;
    const number = Number(value);
    const result = document.getElementById("result");

    if (isNaN(number) || value === "") {
        result.innerText = "Please enter a number!";
        return;
    }

    if (number >= 0) {
        result.innerText = "You are 67 years old!";
    } else {
        result.innerText = "You are 6741 years old!";
    }
}
</script>

</body>
</html>
