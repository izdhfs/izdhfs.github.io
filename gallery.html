<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사진 갤러리</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 30px 20px; margin: 0; background-color: white;
    }

    h1 {
      width: 100%; max-width: 600px; text-align: left;
      font-size: 2.5em; margin-bottom: 25px; font-weight: bold; padding-left: 10px;
    }

    /* 사진들을 감싸는 그리드 박스 */
    .gallery-container {
      position: relative; border: 2px solid #3b4b9b; border-radius: 15px;
      width: 100%; max-width: 600px; padding: 30px 20px; margin-bottom: 40px;
      box-sizing: border-box;
    }

    .gallery-container label {
      position: absolute; top: -12px; left: 15px; background-color: white;
      padding: 0 8px; font-size: 0.9em; color: #3b4b9b; font-weight: bold;
    }

    /* 사진 그리드 배치 */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 핸드폰 기준 2열 */
      gap: 15px;
    }

    .photo-item {
      width: 100%;
      aspect-ratio: 1 / 1; /* 정사각형 유지 */
      background-color: #f8faff;
      border: 1px solid #e0e6ed;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 이미지가 꽉 차게 */
    }

    /* 하단 '이전으로 돌아가기' 버튼 */
    .btn-back {
      background-color: #3b4b9b; color: white; border: none;
      border-radius: 8px; padding: 15px 40px; font-size: 1.1em; cursor: pointer;
    }

    /* PC 배려: 화면이 커지면 3열로 */
    @media (min-width: 768px) {
      .photo-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <h1>갤러리</h1>

  <h3>사진더하고싶으면사진보내세요</h3>
  <div class="gallery-container">
    <label></label>
    
    

    <div class="photo-grid">
      <div class="photo-item">
        <img src="angrybird.jpg" alt="사진 1">
      </div>
      <div class="photo-item">
        <img src="babylaugh.jpg" alt="사진 2">
      </div>
      <div class="photo-item">
        <img src="triplet.jpg" alt="사진 3">
      </div>
      <div class="photo-item">
        <img src="whoisthis.jpg" alt="사진 4">
      </div>
      <div class="photo-item">
        <img src="whytelltruth.png" alt="사진 5">
      </div>
      <div class="photo-item">
        <img src="holyimage.png" alt="사진 6">
      </div>
    </div>

  </div>

  <button class="btn-back" onclick="history.back()">이전으로 돌아가기</button>

</body>
</html>
