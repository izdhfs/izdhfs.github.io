<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SixSeven</title>
<style>
body {
    margin: 0;
    background-color: #f2f2f2;
    font-family: Arial, sans-serif;
    text-align: center;
}

.top {
    position: relative;
    padding-top: 40px;
}

.big-number {
    position: absolute;
    top: 10px;
    font-size: 300px;
    font-weight: 900;
}

.left { left: 40px; }
.right { right: 40px; }

.title {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
}

.buttons {
    margin-top: 180px;
    display: flex;
    justify-content: center;
    gap: 150px;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 35px;
}

button {
    font-size: 28px;
    font-weight: bold;
    padding: 18px 50px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="top">
    <div class="big-number left">67</div>
    <div class="title">WELCOME TO THE SIXSEVEN WEBSITE</div>
    <div class="big-number right">67</div>
</div>

<div class="buttons">
    <div class="column">
        <button onclick="location.href='age.html'">GUESS YOUR AGE</button>
        <button onclick="location.href='calculator.html'">CALCULATOR</button>
    </div>

    <div class="column">
        <button onclick="location.href='birthday.html'">GUESS YOUR BIRTHDAY</button>
        <button onclick="window.open('https://instagram.com/izdhfs ', '_blank')">
            IZDHFS INSTAGRAM
        </button>
    </div>
</div>

</body>
</html>
